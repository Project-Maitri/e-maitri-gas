name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install clasp globally
        run: npm install -g @google/clasp

      - name: Build inline HTML
        run: node build.js

      - name: Create ~/.clasprc.json
        run: |
          cat <<EOF > ~/.clasprc.json
          ${{ secrets.CLASPRC_JSON }}
          EOF

      - name: Create .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.SCRIPT_ID }}","rootDir":"dist"}' > .clasp.json

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy to Web App
        run: |
          # If DEPLOYMENT_ID is provided, try updating it. If it fails or is empty, create a new deployment.
          if [ -n "${{ secrets.DEPLOYMENT_ID }}" ]; then
            echo "Attempting to update existing deployment: ${{ secrets.DEPLOYMENT_ID }}"
            clasp deploy -i ${{ secrets.DEPLOYMENT_ID }} --description "Updated via GitHub Actions: $(date +'%Y-%m-%d %H:%M')" || \
            (echo "Deployment ID not found. Creating a new one..." && clasp deploy --description "New Deployment: $(date +'%Y-%m-%d %H:%M')")
          else
            echo "No DEPLOYMENT_ID found. Creating a new deployment..."
            clasp deploy --description "Initial/New Deployment: $(date +'%Y-%m-%d %H:%M')"
          fi
